allowBuilds:
  '@biomejs/biome': true
  core-js-pure: true
  esbuild: true
  sharp: true
autoInstallPeers: false
dedupePeerDependents: false
enablePrePostScripts: true # next-sitemap requirement
enable-pre-post-scripts: true
lockfile: true
minimumReleaseAge: 1440 # number (minutes) = 1 day
minimumReleaseAgeExclude:
  - 'pnpm'
overrides:
  '@babel/core@^7.0.0': ^7.29.0
  '@babel/helpers@^7.0.0': ^7.29.2
  '@babel/runtime@^7.0.0': ^7.29.2
  '@octokit/plugin-paginate-rest@^14.0.0': ^14.0.0
  '@semantic-release/npm@^13.0.0': ^13.1.5
  brace-expansion@^1.0.0: 1.1.12
  cross-spawn@^7.0.0: ^7.0.6
  elliptic@^6.0.0: ^6.6.1
  esbuild@^0.18.0: ^0.28.0
  esbuild@^0.25.0: ^0.28.0
  flatted@^3.0.0: ^3.4.2
  h3@^1.0.0: ^1.15.9
  js-yaml@^4.0.0: ^4.1.1
  micromatch@^4.0.0: ^4.0.8
  nanoid@^3.0.0: ^3.3.8
  pbkdf2@^3.0.0: ^3.1.5
  preact@^10.0.0: ^10.26.10
  semver@^5.0.0: ^5.7.2
  semver@^6.0.0: ^6.3.1
  semver@^7.0.0: ^7.7.4
  sha.js@^2.0.0: ^2.4.12
  ws@^8.0.0: ^8.20.0
packages:
  - 'packages/*'
  - 'sites/*'
  - '!sites/jerandky.com/*'
patchedDependencies:
  '@semantic-release/commit-analyzer@13.0.1': patches/@semantic-release__commit-analyzer@13.0.0.patch
publicHoistPattern:
  - '*biome*'
  - '*ccommit*'
  - '*eslint*'
  - '*lint-staged*'
  - '*playwright*'
  - '*prettier*'
  - '*semantic*'
  - '*storybook*'
  - '*testing-library*'
  - '*types*'
registry: https://registry.npmjs.org/
saveExact: true
strictPeerDependencies: false
supportedArchitectures:
  os:
    - darwin
    - current
  cpu:
    - x64
    - arm64
tagVersionPrefix: ''
